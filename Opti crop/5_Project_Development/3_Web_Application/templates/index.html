<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiCrop Smart Agricultural Production Optimization Engine</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>🌱 OptiCrop</h1>
    <h2>Smart Agricultural Production Optimization Engine</h2>

    <p class="description">
        Enter the soil nutrient values and environmental conditions to predict the most suitable crop for cultivation.
    </p>

    <form action="/predict" method="POST">

        <label for="N">Nitrogen (N)</label>
        <input type="number" id="N" name="N" placeholder="Enter Nitrogen value" required>

        <label for="P">Phosphorous (P)</label>
        <input type="number" id="P" name="P" placeholder="Enter Phosphorous value" required>

        <label for="K">Potassium (K)</label>
        <input type="number" id="K" name="K" placeholder="Enter Potassium value" required>

        <label for="temperature">Temperature (°C)</label>
        <input type="number" step="0.1" id="temperature" name="temperature" placeholder="Enter Temperature" required>

        <label for="humidity">Humidity (%)</label>
        <input type="number" step="0.1" id="humidity" name="humidity" placeholder="Enter Humidity" required>

        <label for="ph">pH Value</label>
        <input type="number" step="0.1" id="ph" name="ph" placeholder="Enter pH Value" required>

        <label for="rainfall">Rainfall (mm)</label>
        <input type="number" step="0.1" id="rainfall" name="rainfall" placeholder="Enter Rainfall" required>

        <button type="submit">🌾 Predict Best Crop</button>

    </form>

    {% if prediction_text %}
    <div class="result">
        <h2>{{ prediction_text }}</h2>
    </div>
    {% endif %}

    <footer>
        © 2026 OptiCrop | AI-Powered Smart Agriculture
    </footer>

</div>

</body>
</html>
